services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # DaoCloud mirror when docker.io/auth.docker.io times out
        PYTHON_IMAGE: docker.m.daocloud.io/library/python:3.12-slim
    container_name: intellitest-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: docker.m.daocloud.io/library/node:20-alpine
    container_name: intellitest-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
